version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ipl-auction-redis
    ports:
      - "6379:6379"

  server-1:
    build: 
      context: ./server
    environment:
      - PORT=5001
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "5001:5001"

  server-2:
    build: 
      context: ./server
    environment:
      - PORT=5002
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "5002:5002"

  nginx:
    image: nginx:alpine
    container_name: ipl-auction-lb
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - server-1
      - server-2
